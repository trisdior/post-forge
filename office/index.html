<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valencia Construction HQ - Virtual Office</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#D4A017;--gold-light:#F5D060;--dark:#111;--darker:#0a0a0a;--card:#1a1a1a;--card2:#222;--white:#f0f0f0;--green:#4ADE80;--blue:#60A5FA;--red:#F87171;--purple:#C084FC}
body{background:var(--darker);color:var(--white);font-family:'Inter',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}
header{background:linear-gradient(90deg,#000 0%,#1a1a0a 50%,#000 100%);border-bottom:3px solid var(--gold);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;z-index:10}
header h1{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--gold);text-shadow:2px 2px 0 #000,0 0 10px rgba(212,160,23,.4)}
header .subtitle{font-size:11px;color:#888;margin-top:4px}
header .status-dot{width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block;animation:pulse 2s infinite;margin-right:6px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{display:flex;flex:1;overflow:hidden}
.office-wrap{flex:1;position:relative;overflow:hidden;background:#0d0d0d}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;cursor:pointer}
.sidebar{width:320px;background:var(--dark);border-left:2px solid #333;display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#333 #111}
.sidebar::-webkit-scrollbar{width:6px}
.sidebar::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.sidebar h2{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold);padding:16px 16px 8px;border-bottom:1px solid #222}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px}
.stat-card{background:var(--card);border:1px solid #333;border-radius:8px;padding:12px;text-align:center}
.stat-card .num{font-size:28px;font-weight:700;color:var(--gold-light);font-family:'Press Start 2P',monospace}
.stat-card .label{font-size:10px;color:#888;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.agent-cards{padding:8px 16px}
.agent-card{background:var(--card);border:1px solid #333;border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s,background .2s}
.agent-card:hover,.agent-card.active{border-color:var(--gold);background:var(--card2)}
.agent-card .top{display:flex;align-items:center;gap:10px}
.agent-avatar{width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px}
.agent-card .name{font-weight:700;font-size:13px}
.agent-card .role{font-size:10px;color:#888}
.agent-card .status-text{font-size:11px;color:var(--green);margin-top:6px;display:flex;align-items:center;gap:4px}
.agent-card .status-text::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;flex-shrink:0}
.log-section{padding:8px 16px 16px}
.log-entry{font-size:11px;color:#aaa;padding:6px 0;border-bottom:1px solid #1a1a1a;display:flex;gap:8px}
.log-entry .time{color:#555;flex-shrink:0;font-size:10px;font-family:monospace}
.log-entry .agent-tag{color:var(--gold);font-weight:600;flex-shrink:0}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:2px solid var(--gold);border-radius:12px;padding:24px;max-width:420px;width:90%}
.modal h3{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--gold);margin-bottom:12px}
.modal .close-btn{float:right;background:none;border:none;color:#888;font-size:20px;cursor:pointer}
.modal .close-btn:hover{color:#fff}
.modal .detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #222;font-size:13px}
.modal .detail-row .lbl{color:#888}
.modal .activity-list{margin-top:12px;max-height:200px;overflow-y:auto}
.modal .activity-item{font-size:12px;color:#ccc;padding:4px 0}
.modal .activity-item .t{color:#555;font-size:10px;margin-right:6px}

/* Tooltip */
.tooltip{position:absolute;background:#000;border:1px solid var(--gold);border-radius:6px;padding:6px 10px;font-size:11px;color:var(--gold-light);pointer-events:none;z-index:50;display:none;white-space:nowrap;font-family:'Press Start 2P',monospace;font-size:8px}
</style>
</head>
<body>
<header>
  <div>
    <h1>🏗️ VALENCIA CONSTRUCTION HQ</h1>
    <div class="subtitle"><span class="status-dot"></span>All Systems Online — 2 AI Agents Active</div>
  </div>
  <div style="font-size:11px;color:#666">Live Data — <span id="sync-time">synced from Lead Tracker</span></div>
</header>
<div class="main">
  <div class="office-wrap">
    <canvas id="office"></canvas>
    <div class="tooltip" id="tooltip"></div>
  </div>
  <div class="sidebar">
    <h2>📊 DASHBOARD</h2>
    <div class="stat-grid">
      <div class="stat-card"><div class="num" id="s-leads">0</div><div class="label">Total Leads</div></div>
      <div class="stat-card"><div class="num" id="s-estimates">0</div><div class="label">Quotes Sent</div></div>
      <div class="stat-card"><div class="num" id="s-jobs">0</div><div class="label">Jobs Won</div></div>
      <div class="stat-card"><div class="num" id="s-revenue">$0</div><div class="label">Pipeline</div></div>
    </div>
    <h2>🤖 AGENTS</h2>
    <div class="agent-cards" id="agent-cards"></div>
    <h2>📋 ACTIVITY LOG</h2>
    <div class="log-section" id="log-section"></div>
  </div>
</div>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<script src="live-data.js"></script>
<script>
// ============== CONFIG ==============
const AGENTS = [
  { id:'steve', name:'Steve', role:'AI Operations Manager — Estimates, Proposals, Strategy, Automation', emoji:'🔧',
    color:'#D4A017', homeRoom:'office', homeX:0.28, homeY:0.45,
    statuses:['Automating Craigslist lead monitor...','Building daily lead gen system...','Planning $1M growth roadmap...','Setting up email automation...','Coordinating agent workflows...','Generating proposal templates...','Optimizing outreach strategy...','Reviewing lead tracker dashboard...','Updating virtual office...'],
    recentActivity:['Automated CL monitor (4x/day)','Built lead tracker spreadsheet','Created $1M roadmap PDF','Set up Hunter agent','Fixed website nav + footer','Built daily lead gen system']},
  { id:'hunter', name:'Hunter', role:'Lead Generation — Craigslist, Facebook, Nextdoor', emoji:'🎯',
    color:'#4ADE80', homeRoom:'office', homeX:0.48, homeY:0.35,
    statuses:['Scanning Craigslist for leads...','Monitoring labor gigs...','Filtering new posts...','Logging leads to tracker...','Qualifying inbound leads...','Checking domestic gigs...'],
    recentActivity:['Sent 5 CL leads to Tris','Logged leads to spreadsheet','Filtered 157 posts for quality','Skipped contractor spam','Scanning every 4 hours']}
];

const ROOMS = {
  office:     {x:0.05, y:0.15, w:0.45, h:0.55, label:'Main Office'},
  conference: {x:0.55, y:0.15, w:0.40, h:0.35, label:'Conference Room'},
  breakroom:  {x:0.55, y:0.55, w:0.40, h:0.40, label:'Break Room & Gym'},
  reception:  {x:0.05, y:0.75, w:0.45, h:0.20, label:'Reception'}
};

// ============== STATE ==============
let agents = AGENTS.map(a => ({
  ...a,
  x: a.homeX, y: a.homeY,
  targetX: a.homeX, targetY: a.homeY,
  currentStatus: a.statuses[0],
  frame: 0, walkFrame:0, facing:1,
  state:'working', // working, walking, idle
  stateTimer: Math.random()*300+200,
  bubbleAlpha:1, bubbleTimer:200
}));

let logs = [];
let canvas, ctx, W, H, dpr;
let hoveredAgent = null;
let time = 0;

// ============== INIT ==============
function init(){
  canvas = document.getElementById('office');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('click', onClick);
  document.getElementById('modal-overlay').addEventListener('click', e=>{
    if(e.target.id==='modal-overlay') closeModal();
  });
  renderSidebar();
  addLog('steve','Valencia HQ online. 2 agents active — let\'s build.');
  addLog('hunter','Craigslist monitor live. Scanning every 4hrs. Leads auto-logged to tracker.');
  tickDashboard();
  renderLiveActivity();
  if(window.LIVE_DATA && window.LIVE_DATA.lastSync){
    document.getElementById('sync-time').textContent = 'Last sync: ' + window.LIVE_DATA.lastSync;
  }
  requestAnimationFrame(loop);
  setInterval(tickStatuses, 8000);
  setInterval(tickMovement, 5000);
  setInterval(tickDashboard, 12000);
}

function resize(){
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

// ============== DRAWING ==============
function loop(){
  time++;
  update();
  draw();
  requestAnimationFrame(loop);
}

function update(){
  agents.forEach(a=>{
    // Move toward target
    const dx = a.targetX - a.x, dy = a.targetY - a.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if(dist > 0.003){
      a.state = 'walking';
      const spd = 0.0015;
      a.x += (dx/dist)*spd;
      a.y += (dy/dist)*spd;
      a.facing = dx > 0 ? 1 : -1;
      a.walkFrame++;
    } else {
      if(a.state==='walking') a.state='working';
      a.x = a.targetX; a.y = a.targetY;
    }
    a.frame++;
    a.stateTimer--;
    a.bubbleTimer--;
  });
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawFloor();
  drawRooms();
  drawFurniture();
  agents.forEach(drawAgent);
}

function drawFloor(){
  // Subtle grid
  ctx.fillStyle='#0d0d0d';
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#1a1a1a';
  ctx.lineWidth=1;
  const gs=40;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
}

function drawRooms(){
  for(const[key,r] of Object.entries(ROOMS)){
    const rx=r.x*W, ry=r.y*H, rw=r.w*W, rh=r.h*H;
    // Floor
    ctx.fillStyle = key==='office'?'#1a1812':key==='conference'?'#12181a':key==='breakroom'?'#181a12':'#1a1215';
    ctx.fillRect(rx,ry,rw,rh);
    // Walls
    ctx.strokeStyle='#D4A01744';
    ctx.lineWidth=2;
    ctx.strokeRect(rx,ry,rw,rh);
    // Label
    ctx.fillStyle='#D4A01733';
    ctx.font="bold 10px 'Press Start 2P'";
    ctx.fillText(r.label, rx+10, ry+18);
  }
}

function drawFurniture(){
  // Office desks
  drawDesk(0.15,0.35, 'L'); drawDesk(0.28,0.42, 'L');
  drawDesk(0.38,0.35, 'L'); drawDesk(0.15,0.52, 'L');
  // Conference table
  drawTable(0.68,0.25,0.18,0.12);
  // Break room
  drawCouch(0.62,0.68);
  drawWeights(0.82,0.78);
  // Reception
  drawReceptionDesk(0.20,0.82);
  // Plants
  drawPlant(0.50,0.18); drawPlant(0.05,0.14); drawPlant(0.93,0.14);
  drawPlant(0.93,0.55); drawPlant(0.05,0.73);
}

function drawDesk(px,py){
  const x=px*W, y=py*H;
  // Desk surface
  ctx.fillStyle='#3d2b1a';
  ctx.fillRect(x-20,y-4,40,16);
  ctx.fillStyle='#4a341f';
  ctx.fillRect(x-18,y-2,36,12);
  // Monitor
  ctx.fillStyle='#222';
  ctx.fillRect(x-6,y-14,12,10);
  ctx.fillStyle='#1a3a2a';
  if(Math.sin(time*0.05+px*10)>0) ctx.fillStyle='#1a2a3a';
  ctx.fillRect(x-4,y-12,8,6);
  // Monitor stand
  ctx.fillStyle='#333';
  ctx.fillRect(x-1,y-4,2,3);
}

function drawTable(px,py,pw,ph){
  const x=px*W, y=py*H, w=pw*W, h=ph*H;
  ctx.fillStyle='#2a1f0f';
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='#3d2b1a';
  ctx.lineWidth=2;
  ctx.strokeRect(x,y,w,h);
  // Chairs
  for(let i=0;i<3;i++){
    ctx.fillStyle='#333';
    ctx.beginPath();ctx.arc(x+w*0.2+i*(w*0.3),y-8,5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+w*0.2+i*(w*0.3),y+h+8,5,0,Math.PI*2);ctx.fill();
  }
}

function drawCouch(px,py){
  const x=px*W, y=py*H;
  ctx.fillStyle='#2a1520';
  roundRect(x,y,60,24,4);
  ctx.fillStyle='#3a2030';
  roundRect(x+4,y+4,52,16,3);
  // TV
  ctx.fillStyle='#111';
  ctx.fillRect(x-2,y-30,64,22);
  ctx.fillStyle=`hsl(${(time*2)%360},40%,20%)`;
  ctx.fillRect(x+2,y-28,56,18);
}

function drawWeights(px,py){
  const x=px*W, y=py*H;
  ctx.fillStyle='#444';
  ctx.fillRect(x-16,y,32,4);
  ctx.fillStyle='#555';
  ctx.fillRect(x-20,y-2,8,8);
  ctx.fillRect(x+12,y-2,8,8);
  // Dumbbell label
  ctx.fillStyle='#D4A01733';
  ctx.font="8px 'Press Start 2P'";
  ctx.fillText('GYM',x-10,y+18);
}

function drawReceptionDesk(px,py){
  const x=px*W, y=py*H;
  ctx.fillStyle='#2a200f';
  roundRect(x,y,120,20,3);
  ctx.fillStyle='#D4A017';
  ctx.font="bold 8px 'Press Start 2P'";
  ctx.fillText('VALENCIA',x+12,y+14);
}

function drawPlant(px,py){
  const x=px*W, y=py*H;
  ctx.fillStyle='#3a2a1a';
  ctx.fillRect(x-4,y+4,8,8);
  const sway = Math.sin(time*0.02+px*20)*2;
  ctx.fillStyle='#2a6a2a';
  ctx.beginPath();ctx.arc(x+sway,y-2,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a8a3a';
  ctx.beginPath();ctx.arc(x+sway+3,y-5,5,0,Math.PI*2);ctx.fill();
}

function drawAgent(a){
  const x=a.x*W, y=a.y*H;
  const bob = a.state==='walking' ? Math.sin(a.walkFrame*0.3)*3 : Math.sin(a.frame*0.04)*1.5;
  const s = a.facing;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(x,y+16,10,4,0,0,Math.PI*2);ctx.fill();

  // Body
  ctx.fillStyle=a.color;
  ctx.fillRect(x-6,y-4+bob,12,14);

  // Head
  ctx.fillStyle='#F5D0A0';
  ctx.fillRect(x-5,y-14+bob,10,10);

  // Eyes
  ctx.fillStyle='#222';
  const blink = Math.sin(time*0.03+a.homeX*50)>0.95;
  if(!blink){
    ctx.fillRect(x-3+s,y-11+bob,2,2);
    ctx.fillRect(x+2+s,y-11+bob,2,2);
  } else {
    ctx.fillRect(x-3+s,y-10+bob,2,1);
    ctx.fillRect(x+2+s,y-10+bob,2,1);
  }

  // Hair
  ctx.fillStyle=a.id==='steve'?'#333':a.id==='leadgen'?'#8B4513':a.id==='estimator'?'#1a1a3a':'#4a1a4a';
  ctx.fillRect(x-6,y-16+bob,12,4);

  // Arms
  if(a.state==='working'){
    const type = Math.sin(time*0.1+a.homeX*30)*2;
    ctx.fillStyle=a.color;
    ctx.fillRect(x-9,y-1+bob+type,3,8);
    ctx.fillRect(x+6,y-1+bob-type,3,8);
  } else {
    ctx.fillStyle=a.color;
    const swing=Math.sin(a.walkFrame*0.3)*4;
    ctx.fillRect(x-9,y-1+bob+swing,3,8);
    ctx.fillRect(x+6,y-1+bob-swing,3,8);
  }

  // Legs
  ctx.fillStyle='#2a2a3a';
  if(a.state==='walking'){
    const step=Math.sin(a.walkFrame*0.3)*3;
    ctx.fillRect(x-4,y+10+bob,4,6+step);
    ctx.fillRect(x+1,y+10+bob,4,6-step);
  } else {
    ctx.fillRect(x-4,y+10+bob,4,6);
    ctx.fillRect(x+1,y+10+bob,4,6);
  }

  // Name tag
  ctx.fillStyle=a.color;
  ctx.font="bold 8px 'Press Start 2P'";
  ctx.textAlign='center';
  ctx.fillText(a.name, x, y-20+bob);
  ctx.textAlign='left';

  // Speech bubble
  if(a.bubbleTimer > 0 || a.state==='working'){
    const alpha = Math.min(1, a.bubbleTimer>0 ? 1 : 0.7+Math.sin(time*0.05)*0.3);
    drawBubble(x, y-38+bob, a.currentStatus, alpha);
  }

  // Highlight if hovered
  if(hoveredAgent === a){
    ctx.strokeStyle=a.color+'88';
    ctx.lineWidth=2;
    ctx.strokeRect(x-12,y-18+bob,24,36);
  }
}

function drawBubble(x,y,text,alpha){
  ctx.save();
  ctx.globalAlpha=alpha*0.9;
  const maxW=160;
  ctx.font="7px 'Press Start 2P'";
  const short = text.length>28 ? text.slice(0,28)+'...' : text;
  const tw = ctx.measureText(short).width;
  const bw = Math.min(tw+12, maxW);
  const bx = x - bw/2;
  ctx.fillStyle='#000';
  ctx.strokeStyle='#D4A01788';
  ctx.lineWidth=1;
  roundRect(bx,y-14,bw,16,4,true,true);
  // Arrow
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.moveTo(x-4,y+2);ctx.lineTo(x+4,y+2);ctx.lineTo(x,y+7);ctx.fill();
  // Text
  ctx.fillStyle='#F5D060';
  ctx.textAlign='center';
  ctx.fillText(short,x,y-3);
  ctx.textAlign='left';
  ctx.restore();
}

function roundRect(x,y,w,h,r,fill=true,stroke=false){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  if(fill)ctx.fill();
  if(stroke)ctx.stroke();
}

// ============== INTERACTION ==============
function getAgentAt(mx,my){
  const px=mx/W, py=my/H;
  for(const a of agents){
    if(Math.abs(px-a.x)<0.025 && Math.abs(py-a.y)<0.04) return a;
  }
  return null;
}

function onMouseMove(e){
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const a=getAgentAt(mx,my);
  hoveredAgent=a;
  canvas.style.cursor=a?'pointer':'default';
  const tip=document.getElementById('tooltip');
  if(a){
    tip.style.display='block';
    tip.style.left=(e.clientX-canvas.parentElement.getBoundingClientRect().left+12)+'px';
    tip.style.top=(e.clientY-canvas.parentElement.getBoundingClientRect().top-10)+'px';
    tip.textContent=`${a.emoji} ${a.name} - Click for details`;
  } else {
    tip.style.display='none';
  }
}

function onClick(e){
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const a=getAgentAt(mx,my);
  if(a) showModal(a);
}

function showModal(a){
  const m=document.getElementById('modal');
  const activities = a.recentActivity.map((act,i)=>{
    const mins = (i+1)*Math.floor(Math.random()*15+5);
    return `<div class="activity-item"><span class="t">${mins}m ago</span>${act}</div>`;
  }).join('');
  m.innerHTML=`
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h3>${a.emoji} ${a.name}</h3>
    <div class="detail-row"><span class="lbl">Role</span><span>${a.role}</span></div>
    <div class="detail-row"><span class="lbl">Status</span><span style="color:${a.color}">${a.currentStatus}</span></div>
    <div class="detail-row"><span class="lbl">State</span><span style="color:var(--green)">● Active</span></div>
    <div class="detail-row"><span class="lbl">Uptime</span><span>${Math.floor(Math.random()*12+1)}h ${Math.floor(Math.random()*59)}m</span></div>
    <h3 style="margin-top:16px;font-size:9px">Recent Activity</h3>
    <div class="activity-list">${activities}</div>
  `;
  document.getElementById('modal-overlay').classList.add('show');
  // Highlight sidebar card
  document.querySelectorAll('.agent-card').forEach(c=>c.classList.remove('active'));
  document.querySelector(`[data-agent="${a.id}"]`)?.classList.add('active');
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('show');
  document.querySelectorAll('.agent-card').forEach(c=>c.classList.remove('active'));
}

// ============== SIDEBAR ==============
function renderSidebar(){
  const container=document.getElementById('agent-cards');
  container.innerHTML=agents.map(a=>`
    <div class="agent-card" data-agent="${a.id}" onclick="showModal(agents.find(x=>x.id==='${a.id}'))">
      <div class="top">
        <div class="agent-avatar" style="background:${a.color}22;border:1px solid ${a.color}">${a.emoji}</div>
        <div><div class="name">${a.name}</div><div class="role">${a.role}</div></div>
      </div>
      <div class="status-text" id="status-${a.id}">${a.currentStatus}</div>
    </div>
  `).join('');
}

function addLog(agentId, text){
  const a = agents.find(x=>x.id===agentId);
  const now=new Date();
  const t=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  logs.unshift({time:t, agent:a?.name||'System', text});
  if(logs.length>30)logs.pop();
  renderLogs();
}

function renderLogs(){
  document.getElementById('log-section').innerHTML=logs.slice(0,15).map(l=>`
    <div class="log-entry"><span class="time">${l.time}</span><span class="agent-tag">${l.agent}</span><span>${l.text}</span></div>
  `).join('');
}

// ============== TICKS ==============
function tickStatuses(){
  const a = agents[Math.floor(Math.random()*agents.length)];
  a.currentStatus = a.statuses[Math.floor(Math.random()*a.statuses.length)];
  a.bubbleTimer = 200;
  const el = document.getElementById('status-'+a.id);
  if(el) el.textContent = a.currentStatus;
  addLog(a.id, a.currentStatus);
}

function tickMovement(){
  const a = agents[Math.floor(Math.random()*agents.length)];
  if(Math.random()>0.4){
    // Walk to a random room
    const roomKeys = Object.keys(ROOMS);
    const rk = roomKeys[Math.floor(Math.random()*roomKeys.length)];
    const r = ROOMS[rk];
    a.targetX = r.x + r.w*0.2 + Math.random()*r.w*0.6;
    a.targetY = r.y + r.h*0.3 + Math.random()*r.h*0.4;
  } else {
    // Go home
    a.targetX = a.homeX;
    a.targetY = a.homeY;
  }
}

function tickDashboard(){
  const d = window.LIVE_DATA || {};
  document.getElementById('s-leads').textContent = d.totalLeads || 0;
  document.getElementById('s-estimates').textContent = d.quotesSent || 0;
  document.getElementById('s-jobs').textContent = d.won || 0;
  const pv = d.pipelineValue || 0;
  document.getElementById('s-revenue').textContent = pv >= 1000 ? '$' + Math.round(pv/1000) + 'K' : '$' + pv;
}

function renderLiveActivity(){
  const d = window.LIVE_DATA || {};
  if(!d.recentLeads || d.recentLeads.length === 0) return;
  const container = document.getElementById('log-entries');
  if(!container) return;
  d.recentLeads.forEach(lead => {
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = '<span class="time">' + (lead.date||'') + '</span><span class="agent-tag">hunter</span> ' + (lead.category||'Lead') + ' — ' + (lead.description||'').substring(0,40) + (lead.location ? ' ('+lead.location+')' : '');
    container.prepend(entry);
  });
}

// ============== START ==============
init();
</script>
</body>
</html>
