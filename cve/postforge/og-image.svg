<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Logo -->
  <text x="80" y="120" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="800" font-size="42" fill="#fafafa">post<tspan fill="#8b5cf6">forge</tspan></text>
  <!-- Headline -->
  <text x="80" y="260" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="800" font-size="56" fill="#fafafa">AI Social Media Content</text>
  <text x="80" y="330" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="800" font-size="56" fill="#fafafa">for Small Business</text>
  <!-- Subline -->
  <text x="80" y="400" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="400" font-size="28" fill="#a1a1aa">30 days of content in 60 seconds. Sounds human, not robotic.</text>
  <!-- CTA pill -->
  <rect x="80" y="460" width="280" height="56" rx="28" fill="#8b5cf6"/>
  <text x="220" y="496" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="600" font-size="22" fill="white" text-anchor="middle">Free to start →</text>
  <!-- Price -->
  <text x="400" y="496" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="500" font-size="22" fill="#a1a1aa">From $9/mo</text>
  <!-- Sparks -->
  <circle cx="1050" cy="180" r="60" fill="#8b5cf6" opacity="0.15"/>
  <circle cx="1100" cy="350" r="90" fill="#6d28d9" opacity="0.1"/>
  <circle cx="980" cy="450" r="40" fill="#8b5cf6" opacity="0.1"/>
</svg>
