version: '3.8'

services:
  processing:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: postforge-processing
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      PROCESSING_API_KEY: ${PROCESSING_API_KEY:-pf-process-key-dev}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      UPLOAD_DIR: /data/uploads
      CLIPS_DIR: /data/clips
      DEBUG: ${DEBUG:-false}
      REQUIRE_AUTH: ${REQUIRE_AUTH:-true}
    volumes:
      - ./server.js:/app/server.js:ro
      - ./routes:/app/routes:ro
      - ./services:/app/services:ro
      - postforge-uploads:/data/uploads
      - postforge-clips:/data/clips
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  postforge-uploads:
    driver: local
  postforge-clips:
    driver: local
